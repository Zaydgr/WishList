<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>our wishlist 🕊️</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fde8f0;
  --bg2:#fbd4e4;
  --surface:#fff5f8;
  --surface2:#fce9f1;
  --rose:#c9637a;
  --rose-light:#d4537e;
  --rose-dim:#e8a0b0;
  --gold:#b07850;
  --text:#4a1528;
  --muted:#a06070;
  --border:rgba(201,99,122,0.22);
  --border2:rgba(201,99,122,0.4);
}
html,body{min-height:100vh;background:var(--bg);font-family:'Jost',sans-serif;color:var(--text);overflow-x:hidden}
canvas#pigeons{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.app{max-width:680px;margin:0 auto;padding:0 1.25rem 5rem;position:relative;z-index:1}

.hero{text-align:center;padding:3rem 0 2rem}
.hero-eyebrow{font-size:.68rem;letter-spacing:.25em;text-transform:uppercase;color:var(--rose);margin-bottom:.9rem}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:3.2rem;font-weight:400;font-style:italic;color:var(--text);line-height:1;margin-bottom:.4rem}
.hero h1 strong{font-weight:600;color:var(--rose-light);font-style:normal}
.hero-sub{font-size:.78rem;color:var(--muted);letter-spacing:.06em}
.hero-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--rose-dim),transparent);margin:1.2rem auto 0}

.tabs{display:flex;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.8rem;background:var(--surface)}
.tab{flex:1;padding:.72rem;text-align:center;font-size:.76rem;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:.09em;text-transform:uppercase;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:all .2s}
.tab.active{background:var(--rose-light);color:#fff}
.tab-div{width:1px;background:var(--border)}

.pane{display:none}.pane.active{display:block}

.add-form{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.4rem;margin-bottom:1.8rem;position:relative;overflow:hidden}
.add-form::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--rose-dim),transparent)}
.form-label{font-size:.66rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.45rem;font-weight:500}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.full{grid-template-columns:1fr}
input,select,textarea{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-family:'Jost',sans-serif;font-size:.88rem;color:var(--text);outline:none;transition:border .2s;-webkit-appearance:none;appearance:none}
input::placeholder,textarea::placeholder{color:var(--muted)}
input:focus,select:focus,textarea:focus{border-color:var(--rose)}
select option{background:#fff5f8}
.add-btn{width:100%;padding:11px;border-radius:8px;background:var(--rose-light);color:#fff;border:none;font-family:'Jost',sans-serif;font-size:.8rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;margin-top:4px;transition:background .2s}
.add-btn:hover{background:var(--rose)}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.8rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.9rem 1rem;text-align:center}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:2.1rem;font-weight:600;color:var(--rose-light);line-height:1}
.stat-l{font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-top:3px}

.section-head{font-size:.63rem;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);margin-bottom:.85rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}

.wish-grid{display:flex;flex-direction:column;gap:10px}
.wish-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1rem 1.1rem;display:flex;align-items:flex-start;gap:14px;transition:border-color .2s}
.wish-card:hover{border-color:var(--border2)}
.check-btn{width:28px;height:28px;min-width:28px;border-radius:50%;border:1.5px solid var(--rose-dim);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:transparent;font-size:13px;margin-top:2px;font-family:'Jost',sans-serif}
.check-btn:hover{border-color:var(--rose);color:var(--rose)}
.wish-body{flex:1;min-width:0}
.wish-name{font-family:'Cormorant Garamond',serif;font-size:1.18rem;font-weight:600;color:var(--text);margin-bottom:5px;line-height:1.2}
.wish-meta{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.wish-cat{font-size:.7rem;padding:2px 9px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.wish-price{font-size:.82rem;color:var(--gold);font-weight:500}
.prio-high{font-size:.68rem;color:#c9637a;letter-spacing:.06em;text-transform:uppercase}
.prio-med{font-size:.68rem;color:var(--gold);letter-spacing:.06em;text-transform:uppercase}
.wish-link{font-size:.74rem;color:var(--rose);text-decoration:none}
.wish-link:hover{text-decoration:underline}
.del-btn{background:none;border:none;cursor:pointer;color:var(--rose-dim);font-size:.95rem;padding:2px 5px;transition:color .2s;margin-left:auto;font-family:'Jost',sans-serif}
.del-btn:hover{color:var(--rose)}

.empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:.88rem;line-height:1.7}
.empty-icon{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-style:italic;color:var(--rose-dim);margin-bottom:.5rem}

.mem-grid{display:flex;flex-direction:column;gap:14px}
.mem-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s}
.mem-card:hover{border-color:var(--border2)}
.mem-top{padding:1rem 1.1rem;display:flex;align-items:flex-start;gap:14px}
.mem-stamp{width:36px;height:36px;min-width:36px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-top:1px;border:1px solid var(--border)}
.mem-body{flex:1;min-width:0}
.mem-name{font-family:'Cormorant Garamond',serif;font-size:1.18rem;font-weight:600;color:var(--text);margin-bottom:3px}
.mem-granted{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.mem-granted span{color:var(--rose)}
.mem-note-area{border-top:1px solid var(--border);padding:.9rem 1.1rem;background:rgba(201,99,122,0.05)}
.mem-note-saved{font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;color:var(--rose-light);line-height:1.6}
.mem-edit-btn{margin-top:.4rem;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'Jost',sans-serif;padding:0;transition:color .2s}
.mem-edit-btn:hover{color:var(--rose)}
textarea.mem-ta{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-family:'Cormorant Garamond',serif;font-size:.95rem;font-style:italic;color:var(--rose-light);resize:none;outline:none;transition:border .2s}
textarea.mem-ta:focus{border-color:var(--rose)}
textarea.mem-ta::placeholder{color:var(--rose-dim)}
.mem-save-btn{margin-top:7px;padding:6px 16px;border-radius:6px;background:var(--rose-dim);color:#fff;border:none;font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .2s}
.mem-save-btn:hover{background:var(--rose)}
.mem-del{background:none;border:none;cursor:pointer;color:var(--rose-dim);font-size:.9rem;transition:color .2s;padding:2px 4px;margin-left:auto;font-family:'Jost',sans-serif}
.mem-del:hover{color:var(--rose)}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(14px);background:var(--surface);border:1px solid var(--border2);color:var(--rose-light);padding:9px 22px;border-radius:999px;font-size:.76rem;letter-spacing:.06em;opacity:0;transition:all .3s;pointer-events:none;z-index:99;font-family:'Jost',sans-serif}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:520px){
  .hero h1{font-size:2.4rem}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<canvas id="pigeons"></canvas>

<div class="app">
  <div class="hero">
    <div class="hero-eyebrow">a shared collection</div>
    <h1>our <strong>wishes</strong><br>& memories</h1>
    <div class="hero-sub">things we want — and things we lived</div>
    <div class="hero-line"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('wishes',this)">✨ wishlist</button>
    <div class="tab-div"></div>
    <button class="tab" onclick="switchTab('memories',this)">🌸 memories</button>
  </div>

  <div class="pane active" id="pane-wishes">
    <div class="add-form">
      <div class="form-label">a new wish</div>
      <div class="form-row full"><input id="wname" placeholder="what do you wish for…" /></div>
      <div class="form-row">
        <input id="wprice" placeholder="price (optional)" type="number" min="0" step="0.01" />
        <input id="wlink" placeholder="link (optional)" />
      </div>
      <div class="form-row">
        <select id="wcat">
          <option value="">category…</option>
          <option>tech &amp; gadgets</option>
          <option>fashion</option>
          <option>home</option>
          <option>books &amp; media</option>
          <option>experiences</option>
          <option>beauty</option>
          <option>food &amp; drinks</option>
          <option>other</option>
        </select>
        <select id="wprio">
          <option value="">priority…</option>
          <option value="high">high priority</option>
          <option value="med">medium</option>
          <option value="low">low priority</option>
        </select>
      </div>
      <button class="add-btn" onclick="addWish()">add to wishlist</button>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-n" id="stat-total">0</div><div class="stat-l">wishes</div></div>
      <div class="stat"><div class="stat-n" id="stat-mem">0</div><div class="stat-l">memories</div></div>
      <div class="stat"><div class="stat-n" id="stat-val">—</div><div class="stat-l">total value</div></div>
    </div>

    <div class="section-head">current wishes</div>
    <div class="wish-grid" id="wish-list"></div>
  </div>

  <div class="pane" id="pane-memories">
    <div class="section-head" style="margin-bottom:1.2rem">wishes that came true</div>
    <div class="mem-grid" id="mem-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Pigeon animation ──────────────────────────────────────────
const canvas = document.getElementById('pigeons');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

function drawPigeon(ctx, x, y, scale, wingAngle, facing) {
  ctx.save();
  ctx.translate(x, y);
  if (facing < 0) ctx.scale(-1, 1);
  ctx.scale(scale, scale);

  const body   = '#b8a4b0';
  const wing   = '#9e8e9a';
  const breast = '#d4c0cc';
  const neck   = '#c8b4c0';
  const beak   = '#c8a060';

  ctx.save();
  ctx.translate(0, Math.sin(wingAngle * 2) * 1.5);

  // upper wing
  ctx.save();
  ctx.rotate(-wingAngle * 0.7);
  ctx.beginPath();
  ctx.ellipse(-8, -4, 18, 7, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = wing; ctx.fill();
  ctx.restore();

  // lower wing tip
  ctx.save();
  ctx.rotate(-wingAngle * 1.2);
  ctx.beginPath();
  ctx.moveTo(-4, -2);
  ctx.bezierCurveTo(-18, -14, -28, -8, -24, 2);
  ctx.bezierCurveTo(-18, 8, -8, 4, -4, -2);
  ctx.fillStyle = wing; ctx.fill();
  ctx.restore();

  // body
  ctx.beginPath();
  ctx.ellipse(0, 0, 14, 9, 0.15, 0, Math.PI * 2);
  ctx.fillStyle = body; ctx.fill();

  // breast
  ctx.beginPath();
  ctx.ellipse(8, 2, 8, 7, 0.3, 0, Math.PI * 2);
  ctx.fillStyle = breast; ctx.fill();

  // neck
  ctx.beginPath();
  ctx.ellipse(12, -5, 6, 5, -0.4, 0, Math.PI * 2);
  ctx.fillStyle = neck; ctx.fill();

  // head
  ctx.beginPath();
  ctx.arc(16, -9, 5.5, 0, Math.PI * 2);
  ctx.fillStyle = body; ctx.fill();

  // iridescent neck patch
  ctx.beginPath();
  ctx.ellipse(13, -6, 4, 3, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(180,140,200,0.4)'; ctx.fill();

  // beak
  ctx.beginPath();
  ctx.moveTo(21, -10); ctx.lineTo(27, -10); ctx.lineTo(26, -8); ctx.lineTo(21, -9);
  ctx.fillStyle = beak; ctx.fill();

  // beak knob
  ctx.beginPath();
  ctx.ellipse(22, -11, 3, 1.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#e0bca0'; ctx.fill();

  // eye ring
  ctx.beginPath();
  ctx.arc(18, -10, 2, 0, Math.PI * 2);
  ctx.fillStyle = '#e8c030'; ctx.fill();
  // pupil
  ctx.beginPath();
  ctx.arc(18, -10, 1, 0, Math.PI * 2);
  ctx.fillStyle = '#3a2030'; ctx.fill();

  // tail
  ctx.beginPath();
  ctx.moveTo(-12, 0);
  ctx.bezierCurveTo(-20, 2, -24, 8, -20, 10);
  ctx.bezierCurveTo(-16, 12, -10, 8, -8, 4);
  ctx.fillStyle = wing; ctx.fill();

  ctx.restore();
  ctx.restore();
}

const pigeons = Array.from({ length: 7 }, (_, i) => {
  const facing = Math.random() > 0.5 ? 1 : -1;
  return {
    x: facing > 0 ? -80 - i * 180 : window.innerWidth + 80 + i * 180,
    y: 60 + Math.random() * 280,
    speed: (0.5 + Math.random() * 0.8) * facing,
    scale: 0.55 + Math.random() * 0.35,
    wingAngle: Math.random() * Math.PI * 2,
    wingSpeed: 0.04 + Math.random() * 0.04,
    facing,
    bobOffset: Math.random() * Math.PI * 2,
  };
});

let frame = 0;
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  frame++;
  pigeons.forEach(p => {
    p.x += p.speed * 0.9;
    p.wingAngle += p.wingSpeed;
    const bob = Math.sin(frame * 0.018 + p.bobOffset) * 3;
    if (p.facing > 0 && p.x > canvas.width + 120)  p.x = -120;
    if (p.facing < 0 && p.x < -120) p.x = canvas.width + 120;
    drawPigeon(ctx, p.x, p.y + bob, p.scale, Math.sin(p.wingAngle) * 0.55, p.facing);
  });
  requestAnimationFrame(animate);
}
animate();

// ── App logic ─────────────────────────────────────────────────
let wishes   = JSON.parse(localStorage.getItem('cwp_wishes')   || '[]');
let memories = JSON.parse(localStorage.getItem('cwp_memories') || '[]');

const catEmoji = {
  'tech & gadgets':'🎮','fashion':'👗','home':'🏡',
  'books & media':'📚','experiences':'✈️','beauty':'💄',
  'food & drinks':'🍽️','other':'🎁','':'🎁'
};

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-' + tab).classList.add('active');
}

function addWish() {
  const name = document.getElementById('wname').value.trim();
  if (!name) return;
  wishes.push({
    id: Date.now(), name,
    price: document.getElementById('wprice').value || null,
    link:  document.getElementById('wlink').value.trim() || null,
    cat:   document.getElementById('wcat').value || null,
    prio:  document.getElementById('wprio').value || null,
    added: new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })
  });
  save();
  ['wname','wprice','wlink'].forEach(id => document.getElementById(id).value = '');
  ['wcat','wprio'].forEach(id => document.getElementById(id).value = '');
  showToast('wish added 🌸');
}

function grantWish(id) {
  const w = wishes.find(x => x.id === id);
  if (!w) return;
  memories.unshift({
    id: Date.now(), name: w.name, price: w.price, link: w.link, cat: w.cat,
    grantedOn: new Date().toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' }),
    note: ''
  });
  wishes = wishes.filter(x => x.id !== id);
  save();
  showToast('wish granted ✨');
}

function delWish(id)   { wishes   = wishes.filter(x => x.id !== id); save(); }
function delMemory(id) { memories = memories.filter(x => x.id !== id); save(); showToast('memory removed'); }

function saveNote(id) {
  const m = memories.find(x => x.id === id);
  if (!m) return;
  const el = document.getElementById('mnote-' + id);
  m.note = el ? el.value.trim() : '';
  save();
  showToast('note saved 💌');
}

function editNote(id) {
  const m = memories.find(x => x.id === id);
  if (!m) return;
  m.note = '';
  save();
}

function save() {
  localStorage.setItem('cwp_wishes',   JSON.stringify(wishes));
  localStorage.setItem('cwp_memories', JSON.stringify(memories));
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const list  = document.getElementById('wish-list');
  const mlist = document.getElementById('mem-list');

  document.getElementById('stat-total').textContent = wishes.length;
  document.getElementById('stat-mem').textContent   = memories.length;
  const prices = wishes.filter(w => w.price).map(w => parseFloat(w.price));
  document.getElementById('stat-val').textContent   =
    prices.length ? '$' + Math.round(prices.reduce((a,b) => a+b, 0)) : '—';

  const prioOrder = { high:0, med:1, low:2, '':3 };
  const sorted = [...wishes].sort((a,b) =>
    (prioOrder[a.prio||'']||3) - (prioOrder[b.prio||'']||3));

  list.innerHTML = !sorted.length
    ? '<div class="empty"><div class="empty-icon">~</div><div>no wishes yet<br><span style="font-size:.76rem">add your first one above</span></div></div>'
    : sorted.map(w => `
      <div class="wish-card">
        <button class="check-btn" onclick="grantWish(${w.id})" title="grant this wish">✓</button>
        <div class="wish-body">
          <div class="wish-name">${esc(w.name)}</div>
          <div class="wish-meta">
            ${w.cat   ? `<span class="wish-cat">${esc(w.cat)}</span>` : ''}
            ${w.price ? `<span class="wish-price">$${parseFloat(w.price).toFixed(2)}</span>` : ''}
            ${w.prio === 'high' ? '<span class="prio-high">high priority</span>'
              : w.prio === 'med' ? '<span class="prio-med">medium</span>' : ''}
            ${w.link  ? `<a class="wish-link" href="${esc(w.link)}" target="_blank">view →</a>` : ''}
          </div>
        </div>
        <button class="del-btn" onclick="delWish(${w.id})">✕</button>
      </div>`).join('');

  mlist.innerHTML = !memories.length
    ? '<div class="empty"><div class="empty-icon">❧</div><div>no memories yet<br><span style="font-size:.76rem">grant a wish to begin your story</span></div></div>'
    : memories.map(m => `
      <div class="mem-card">
        <div class="mem-top">
          <div class="mem-stamp">${catEmoji[m.cat||''] || '🎁'}</div>
          <div class="mem-body">
            <div class="mem-name">${esc(m.name)}</div>
            <div class="mem-granted">granted on <span>${m.grantedOn}</span></div>
          </div>
          <button class="mem-del" onclick="delMemory(${m.id})">✕</button>
        </div>
        <div class="mem-note-area">
          ${m.note
            ? `<div class="mem-note-saved">"${esc(m.note)}"</div>
               <button class="mem-edit-btn" onclick="editNote(${m.id})">edit note</button>`
            : `<textarea id="mnote-${m.id}" class="mem-ta" rows="2"
                 placeholder="write a memory… how did it feel?"></textarea>
               <br><button class="mem-save-btn" onclick="saveNote(${m.id})">save note</button>`}
        </div>
      </div>`).join('');
}

render();
</script>
</body>
</html>
